<app-toast></app-toast>
<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<!-- Full-page routes: landing, login, register — no app shell -->
<ng-container *ngIf="isAuthPage(); else appShell">
  <router-outlet></router-outlet>
</ng-container>

<!-- App shell: authenticated routes get banner, sidebar, FAB -->
<ng-template #appShell>
  <div class="app-container">
    <app-banner></app-banner>
    <div class="main-content sidebar-visible">
      <div class="content">
        <router-outlet></router-outlet>
      </div>
      <app-sidebar></app-sidebar>
    </div>
    <app-fab-create-task (createClicked)="openCreateTaskDialog()"></app-fab-create-task>
  </div>
</ng-template>
